<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="rg" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#00E5FF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.18"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- halo doux -->
  <circle cx="32" cy="32" r="26" fill="url(#rg)"/>
  <!-- anneau néon principal -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#00E5FF" stroke-width="5"
          filter="url(#glow)" stroke-opacity="0.95"/>
  <!-- liseré intérieur fin (rappel vert Conky) -->
  <circle cx="32" cy="32" r="13" fill="none" stroke="#00FF99" stroke-width="1.6"
          stroke-opacity="0.55"/>
  <!-- noyau -->
  <circle cx="32" cy="32" r="4.5" fill="#00E5FF" filter="url(#glow)"/>
</svg>
